<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }

        input {
            margin: 10px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background: #ff6f91;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Login</h2>
    <form method="POST">
        <input name="username" placeholder="Username" required><br>
        <input name="password" type="password" placeholder="Password" required><br>
        <button>Login</button>
    </form>
</div>

</body>
</html>
